<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>D-YSIMs Studios</title>
<meta name="theme-color" content="#7c3aed"/>
<link rel="manifest" href="manifest.json"/>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700&family=Space+Mono&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:#07080f;--deep:#0b0d16;--panel:#0f1120;
  --border:rgba(255,255,255,0.08);
  --v:#7c3aed;--v2:#9d5ff5;--rose:#f472b6;--cyan:#22d3ee;
  --gold:#fbbf24;--text:#e8eaf6;--muted:#4a4d6a;--dim:#8a8db0;
  --grad:linear-gradient(135deg,#7c3aed,#f472b6);
}
html{scroll-behavior:smooth}
body{background:var(--ink);color:var(--text);font-family:'Inter',sans-serif;overflow-x:hidden}

nav{
  position:fixed;top:0;left:0;right:0;z-index:100;
  display:flex;align-items:center;justify-content:space-between;
  padding:0.75rem 1.25rem;
  background:rgba(7,8,15,0.96);
  border-bottom:1px solid var(--border);
}
.nav-logo{display:flex;align-items:center;gap:0.6rem}
.nav-logo img{height:34px}
.nav-logo span{
  font-family:'Bebas Neue',sans-serif;font-size:1.1rem;letter-spacing:0.06em;
  background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;
}

.hero{
  min-height:100vh;display:flex;align-items:center;
  justify-content:center;text-align:center;
  padding:5rem 1.25rem 3rem;
  background:radial-gradient(ellipse at 50% 30%,rgba(124,58,237,0.18),transparent 65%),var(--ink);
}
.hero-logo{
  width:min(180px,50vw);margin:0 auto 1.25rem;
  filter:drop-shadow(0 0 30px rgba(124,58,237,0.5));
  animation:float 4s ease-in-out infinite;
  display:block;
}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
.hero-badge{
  display:inline-block;
  background:rgba(124,58,237,0.12);border:1px solid rgba(124,58,237,0.3);
  color:var(--v2);padding:0.28rem 0.8rem;border-radius:20px;
  font-size:0.65rem;font-family:'Space Mono',monospace;letter-spacing:0.1em;
  margin-bottom:1rem;
}
.hero-title{
  font-family:'Bebas Neue',sans-serif;
  font-size:clamp(2.8rem,11vw,5rem);
  line-height:0.95;letter-spacing:0.02em;margin-bottom:0.85rem;
}
.hero-title .t1{color:#fff;display:block}
.hero-title .t2{
  background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;display:block;
}
.hero-sub{
  font-size:0.92rem;color:var(--dim);
  max-width:420px;margin:0 auto 2rem;line-height:1.7;
}
.hero-cta{
  display:inline-block;
  background:var(--grad);color:#fff;
  padding:0.9rem 2rem;border-radius:8px;
  font-weight:600;font-size:0.95rem;
  text-decoration:none;
  box-shadow:0 0 35px rgba(124,58,237,0.35);
}

/* STUDIOS */
.studios{padding:4rem 1.25rem;background:var(--deep)}
.sec-head{text-align:center;margin-bottom:2rem}
.sec-head h2{
  font-family:'Bebas Neue',sans-serif;
  font-size:clamp(1.8rem,6vw,2.8rem);letter-spacing:0.04em;
}
.sec-head p{color:var(--muted);font-size:0.82rem;margin-top:0.3rem}
.grad-text{background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent}

.studios-grid{
  display:flex;flex-direction:column;gap:1rem;
  max-width:680px;margin:0 auto;
}

/* KEY FIX: pure <a> cards, no JS, no canvas, no z-index fight */
.sc{
  display:block;
  background:var(--panel);
  border:1px solid var(--border);
  border-radius:14px;
  text-decoration:none;
  color:var(--text);
  padding:1.5rem;
  transition:border-color 0.2s,transform 0.15s;
  -webkit-tap-highlight-color:rgba(124,58,237,0.15);
  position:relative;
  overflow:hidden;
}
.sc:active{transform:scale(0.985);border-color:rgba(124,58,237,0.5)}
.sc-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:0.85rem}
.sc-icon{
  font-size:2rem;width:52px;height:52px;
  background:rgba(124,58,237,0.1);border:1px solid rgba(124,58,237,0.2);
  border-radius:10px;display:flex;align-items:center;justify-content:center;
}
.sc-badge{
  padding:0.22rem 0.6rem;border-radius:20px;
  font-size:0.6rem;font-family:'Space Mono',monospace;letter-spacing:0.06em;
}
.badge-free{background:rgba(34,211,238,0.1);color:var(--cyan);border:1px solid rgba(34,211,238,0.2)}
.badge-pro{background:rgba(251,191,36,0.1);color:var(--gold);border:1px solid rgba(251,191,36,0.25)}
.sc-title{
  font-family:'Bebas Neue',sans-serif;font-size:1.35rem;
  letter-spacing:0.05em;color:#fff;margin-bottom:0.35rem;
}
.sc-desc{font-size:0.8rem;color:var(--dim);line-height:1.6;margin-bottom:0.85rem}
.sc-tags{display:flex;gap:0.35rem;flex-wrap:wrap;margin-bottom:1rem}
.sc-tag{
  background:rgba(124,58,237,0.08);border:1px solid rgba(124,58,237,0.15);
  color:var(--v2);padding:0.18rem 0.5rem;border-radius:4px;
  font-size:0.62rem;font-family:'Space Mono',monospace;
}
.sc-btn{
  display:flex;align-items:center;justify-content:center;gap:0.4rem;
  background:var(--grad);color:#fff;
  padding:0.75rem;border-radius:7px;
  font-size:0.88rem;font-weight:600;
  pointer-events:none;/* parent <a> handles tap */
}

/* HOW */
.how{padding:3.5rem 1.25rem;background:var(--ink)}
.steps{display:flex;flex-direction:column;gap:0.85rem;max-width:600px;margin:0 auto}
.step{
  background:var(--panel);border:1px solid var(--border);
  border-radius:10px;padding:1.1rem;
  display:flex;gap:0.85rem;align-items:flex-start;
}
.step-num{
  width:32px;height:32px;flex-shrink:0;border-radius:50%;
  background:var(--grad);
  display:flex;align-items:center;justify-content:center;
  font-family:'Bebas Neue',sans-serif;font-size:1rem;
}
.step h3{font-family:'Bebas Neue',sans-serif;font-size:0.95rem;letter-spacing:0.05em;color:#fff;margin-bottom:0.25rem}
.step p{font-size:0.76rem;color:var(--dim);line-height:1.55}

/* TEAM */
.team{padding:3.5rem 1.25rem;background:var(--deep)}
.team-grid{display:flex;flex-direction:column;gap:0.85rem;max-width:600px;margin:1.25rem auto 0}
.tc{
  background:var(--panel);border:1px solid var(--border);
  border-radius:10px;padding:1.25rem;
  display:flex;gap:0.85rem;align-items:flex-start;
}
.tc-av{
  width:46px;height:46px;flex-shrink:0;border-radius:50%;
  background:var(--grad);
  display:flex;align-items:center;justify-content:center;font-size:1.25rem;
}
.tc-name{font-family:'Bebas Neue',sans-serif;font-size:1.05rem;letter-spacing:0.05em;color:#fff}
.tc-role{font-size:0.62rem;color:var(--v2);font-family:'Space Mono',monospace;margin-bottom:0.35rem}
.tc-desc{font-size:0.76rem;color:var(--dim);line-height:1.55}

footer{
  padding:2.5rem 1.25rem;background:var(--ink);
  border-top:1px solid var(--border);text-align:center;
}
footer img{height:40px;display:block;margin:0 auto 0.6rem}
footer p{font-size:0.75rem;color:var(--muted);margin-bottom:0.3rem}
footer a{color:var(--v2);text-decoration:none}

@media(min-width:640px){
  .studios-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
  .studios-grid .sc:first-child{grid-column:1/-1}
  .steps{display:grid;grid-template-columns:1fr 1fr}
  .team-grid{display:grid;grid-template-columns:1fr 1fr}
}
</style>
</head>
